<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Contatti - Fitness with Pets</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Tuo CSS -->
    <link rel="stylesheet" href="/css/style.css?v=3">
</head>

<body>

<div class="container my-5">

    <div class="row justify-content-center">

        <div class="col-md-8 col-lg-6">

            <div class="card shadow rounded-4 p-4 border-success">

                <div class="text-center mb-4">
                    <img src="/img/logo.jpg" alt="Logo Fitness with Pets" style="width: 110px; border-radius: 50%;">
                    <h1 class="text-success fw-bold mt-3">Contattaci</h1>
                    <p class="text-muted">
                        Hai domande sui nostri programmi o vuoi ricevere informazioni?
                        Inviaci un messaggio.
                    </p>
                </div>

                <div id="messaggioSuccesso" class="alert alert-success d-none" role="alert">
                    Messaggio inviato correttamente! Ti risponderemo appena possibile.
                </div>

                <form id="formContatti">

                    <div class="mb-3">
                        <label for="nome" class="form-label text-success fw-bold">Nome</label>
                        <input type="text" id="nome" name="nome" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label for="email" class="form-label text-success fw-bold">Indirizzo email</label>
                        <input type="email" id="email" name="email" class="form-control" required>
                    </div>

                    <div class="mb-4">
                        <label for="messaggio" class="form-label text-success fw-bold">Messaggio</label>
                        <textarea id="messaggio" name="messaggio" class="form-control" rows="5" required></textarea>
                    </div>

                    <div class="d-flex justify-content-center gap-3 flex-wrap">
                        <button type="submit" class="btn btn-success px-4">
                            Invia messaggio
                        </button>

                        <button type="reset" class="btn btn-outline-success px-4">
                            Cancella
                        </button>

                        <a href="/" class="btn btn-dark px-4">
                            Torna alla home
                        </a>
                    </div>

                </form>

            </div>

        </div>

    </div>

</div>

<script>
    const formContatti = document.getElementById("formContatti");
    const messaggioSuccesso = document.getElementById("messaggioSuccesso");

    formContatti.addEventListener("submit", function(event) {
        event.preventDefault();

        messaggioSuccesso.classList.remove("d-none");
        formContatti.reset();
    });
</script>

</body>
</html>
