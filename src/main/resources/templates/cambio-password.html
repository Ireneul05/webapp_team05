<!DOCTYPE html>
<html lang="it"
      xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1">

    <title>Fitness with Pets</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>
        body {
            background-color: #f0fdf4;
        }

        .barra-superiore {
            background-color: #14532d;
        }

        .logo {
            width: 48px;
            height: 48px;
            object-fit: contain;
            border-radius: 50%;
        }

        .scheda-password {
            max-width: 600px;
            margin: auto;
        }

        footer {
            background-color: #14532d;
            color: white;
        }
    </style>
</head>

<body>

<nav class="navbar navbar-dark barra-superiore">

    <div class="container">

        <span class="navbar-brand d-flex align-items-center gap-2">

            <img th:src="@{/img/logo.jpg}"
                 class="logo"
                 alt="Logo Fitness with Pets">

            <span class="fw-bold">
                Fitness with Pets
            </span>

        </span>

        <div class="d-flex align-items-center gap-3">

            <span class="text-white"
                  th:text="${username}">
                username
            </span>

            <form th:action="@{/perform-logout}"
                  method="post">

                <button type="submit"
                        class="btn btn-outline-light btn-sm">
                    Logout
                </button>

            </form>

        </div>

    </div>

</nav>

<main class="container py-5">

    <section class="scheda-password bg-white rounded-4 shadow-sm p-4">

        <p class="text-success fw-bold mb-2">
            Area personale
        </p>

        <h1 class="fw-bold mb-3">
            Cambio password
        </h1>

        <p class="text-muted">
            La nuova password deve essere lunga esattamente
            8 caratteri e contenere la stringa
            <strong>id_05</strong>.
        </p>

        <div th:if="${successo}"
             class="alert alert-success"
             th:text="${successo}">
        </div>

        <div th:if="${errore}"
             class="alert alert-danger"
             th:text="${errore}">
        </div>

        <!--
            Non specificando action, la form viene inviata
            allo stesso indirizzo della pagina corrente.
        -->
        <form method="post"
              onsubmit="return validaCambioPassword()">

            <input type="hidden"
                   th:name="${_csrf.parameterName}"
                   th:value="${_csrf.token}">

            <div class="mb-3">

                <label for="passwordAttuale"
                       class="form-label fw-bold text-success">
                    Password attuale
                </label>

                <input type="password"
                       class="form-control"
                       id="passwordAttuale"
                       name="passwordAttuale"
                       autocomplete="current-password"
                       required>

            </div>

            <div class="mb-3">

                <label for="nuovaPassword"
                       class="form-label fw-bold text-success">
                    Nuova password
                </label>

                <input type="password"
                       class="form-control"
                       id="nuovaPassword"
                       name="nuovaPassword"
                       minlength="8"
                       maxlength="8"
                       autocomplete="new-password"
                       required>

            </div>

            <div class="mb-3">

                <label for="confermaPassword"
                       class="form-label fw-bold text-success">
                    Conferma nuova password
                </label>

                <input type="password"
                       class="form-control"
                       id="confermaPassword"
                       name="confermaPassword"
                       minlength="8"
                       maxlength="8"
                       autocomplete="new-password"
                       required>

            </div>

            <div id="erroreJavaScript"
                 class="alert alert-warning d-none">
            </div>

            <div class="d-grid gap-2 mt-4">

                <button type="submit"
                        class="btn btn-success">
                    Modifica password
                </button>

                <button type="reset"
                        class="btn btn-outline-success"
                        onclick="nascondiErrore()">
                    Reset
                </button>

                <a th:href="${dashboardUrl}"
                   class="btn btn-dark">
                    Torna alla dashboard
                </a>

            </div>

        </form>

    </section>

</main>

<footer class="py-4 mt-5">

    <div class="container text-center">

        <p class="fw-bold mb-1">
            Fitness with Pets
        </p>

        <p class="small mb-0">
            Team 05 — Cambio password
        </p>

    </div>

</footer>

<script>
    function validaCambioPassword() {

        const nuovaPassword =
            document.getElementById("nuovaPassword").value;

        const confermaPassword =
            document.getElementById("confermaPassword").value;

        const errore =
            document.getElementById("erroreJavaScript");

        if (nuovaPassword.length !== 8) {

            mostraErrore(
                "La nuova password deve essere lunga esattamente 8 caratteri."
            );

            return false;
        }

        if (!nuovaPassword.includes("id_05")) {

            mostraErrore(
                "La nuova password deve contenere la stringa id_05."
            );

            return false;
        }

        if (nuovaPassword !== confermaPassword) {

            mostraErrore(
                "La nuova password e la conferma non coincidono."
            );

            return false;
        }

        errore.classList.add("d-none");

        return true;
    }

    function mostraErrore(messaggio) {

        const errore =
            document.getElementById("erroreJavaScript");

        errore.textContent = messaggio;
        errore.classList.remove("d-none");
    }

    function nascondiErrore() {

        const errore =
            document.getElementById("erroreJavaScript");

        errore.classList.add("d-none");
    }
</script>

</body>
</html>
