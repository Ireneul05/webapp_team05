<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Login - Fitness with Pets</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body class="bg-light">

<div class="container min-vh-100 d-flex justify-content-center align-items-center">

    <div class="card shadow p-4" style="width: 100%; max-width: 450px;">

        <div class="text-center mb-4">

            <img th:src="@{/img/logo.jpg}"
                 alt="Logo Fitness with Pets"
                 style="width: 100px; height: 100px; object-fit: contain;">

            <h1 class="text-success fw-bold mt-3">
                Login
            </h1>

            <p class="text-muted">
                Accedi al tuo account per iniziare l’allenamento.
            </p>

        </div>

        <!-- Errore restituito da Spring Security -->
        <div th:if="${param.error}"
             class="alert alert-danger text-center">

            #05: That user is not authenticated!

        </div>

        <form th:action="@{/login}"
              method="post"
              onsubmit="return validaLogin()">

            <div class="mb-3">

                <label for="username"
                       class="form-label fw-bold text-success">
                    Username
                </label>

                <input type="text"
                       class="form-control"
                       id="username"
                       name="username"
                       placeholder="Inserisci username"
                       autocomplete="username"
                       required>

            </div>

            <div class="mb-3">

                <label for="password"
                       class="form-label fw-bold text-success">
                    Password
                </label>

                <input type="password"
                       class="form-control"
                       id="password"
                       name="password"
                       placeholder="Inserisci password"
                       autocomplete="current-password"
                       required>

            </div>

            <!-- Errore della validazione JavaScript -->
            <div id="errore-password"
                 class="alert alert-warning d-none">
            </div>

            <div class="d-grid gap-2 mt-4">

                <button type="submit"
                        class="btn btn-success">
                    Accedi
                </button>

                <button type="reset"
                        class="btn btn-outline-success"
                        onclick="nascondiErrore()">
                    Reset
                </button>

                <a th:href="@{/}"
                   class="btn btn-dark">
                    Torna alla home
                </a>

            </div>

        </form>

        <div class="text-center mt-4">

            <p class="mb-0">

                Non hai ancora un account?

                <a th:href="@{/signup}"
                   class="text-success fw-bold">
                    Registrati
                </a>

            </p>

        </div>

    </div>

</div>

<script th:src="@{/js/login.js}"></script>

</body>
</html>
