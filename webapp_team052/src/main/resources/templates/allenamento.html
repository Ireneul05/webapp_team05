<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Allenamenti - Fitness with Pets</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>
        body {
            background-color: #f0fdf4;
        }

        .navbar-personalizzata {
            background-color: #14532d;
        }

        .card-allenamento {
            height: 100%;
        }
    </style>
</head>

<body>

<nav class="navbar navbar-dark navbar-personalizzata">
    <div class="container">

        <a class="navbar-brand fw-bold"
           th:href="@{/basic/dashboard}">
            Fitness with Pets
        </a>

        <span class="badge bg-primary">
            Piano Basic
        </span>

    </div>
</nav>

<main class="container py-5">

    <h1 class="text-success fw-bold">
        Programmi di allenamento
    </h1>

    <p class="text-muted mb-4">
        Benvenuto
        <strong th:text="${username}">utente</strong>.
        Qui saranno mostrati i programmi predefiniti recuperati dal servizio REST.
    </p>

    <div class="row g-4">

        <div class="col-md-6 col-lg-4">
            <div class="card card-allenamento border-0 shadow-sm">
                <div class="card-body p-4">

                    <h2 class="h5 text-success fw-bold">
                        Allenamento base
                    </h2>

                    <p class="text-muted">
                        Programma dimostrativo per verificare il funzionamento
                        della pagina prima del collegamento REST.
                    </p>

                    <button class="btn btn-success w-100"
                            type="button">
                        Visualizza programma
                    </button>

                </div>
            </div>
        </div>

    </div>

    <a th:href="@{/basic/dashboard}"
       class="btn btn-outline-success mt-4">
        Torna alla dashboard
    </a>

</main>

</body>
</html>
