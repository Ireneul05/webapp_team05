<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1">

    <title>Fitness with Pets</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>
        body {
            background-color: #f0fdf4;
        }

        .barra-superiore {
            background-color: #14532d;
        }

        .logo {
            width: 48px;
            height: 48px;
            object-fit: contain;
            border-radius: 50%;
        }

        .scheda-profilo {
            max-width: 750px;
            margin: auto;
        }

        footer {
            background-color: #14532d;
            color: white;
        }
    </style>
</head>

<body>

<nav class="navbar navbar-dark barra-superiore">

    <div class="container">

        <span class="navbar-brand d-flex align-items-center gap-2">

            <img th:src="@{/img/logo.jpg}"
                 class="logo"
                 alt="Logo Fitness with Pets">

            <span class="fw-bold">
                Fitness with Pets
            </span>

        </span>

        <form th:action="@{/perform-logout}" method="post">

            <button type="submit"
                    class="btn btn-outline-light btn-sm">
                Logout
            </button>

        </form>

    </div>

</nav>

<main class="container py-5">

    <section class="scheda-profilo bg-white rounded-4 shadow-sm p-4">

        <p class="text-success fw-bold mb-2">
            Area personale
        </p>

        <h1 class="fw-bold mb-4">
            Il tuo profilo
        </h1>

        <div class="table-responsive">

            <table class="table table-bordered align-middle">

                <tbody>

                <tr>
                    <th class="table-success">Username</th>
                    <td th:text="${profilo.username}">
                        username
                    </td>
                </tr>

                <tr>
                    <th class="table-success">Nome</th>
                    <td th:text="${profilo.nome}">
                        Nome
                    </td>
                </tr>

                <tr>
                    <th class="table-success">Cognome</th>
                    <td th:text="${profilo.cognome}">
                        Cognome
                    </td>
                </tr>

                <tr>
                    <th class="table-success">Data di nascita</th>

                    <td th:text="${#dates.format(
                            profilo.dataNascita,
                            'dd/MM/yyyy')}">
                        01/01/2000
                    </td>
                </tr>

                <tr>
                    <th class="table-success">Email</th>
                    <td th:text="${profilo.email}">
                        email
                    </td>
                </tr>

                <tr>
                    <th class="table-success">Ruolo</th>

                    <td>
                        <span class="badge bg-success"
                              th:text="${profilo.ruolo}">
                            ROLE_USER
                        </span>
                    </td>
                </tr>

                </tbody>

            </table>

        </div>

        <div class="d-grid gap-2 mt-4">

            <a th:if="${profilo.ruolo == 'ROLE_USER_PROVA'}"
               th:href="@{/prova/dashboard}"
               class="btn btn-outline-success">
                Torna alla dashboard
            </a>

            <a th:if="${profilo.ruolo == 'ROLE_USER_BASIC'}"
               th:href="@{/basic/dashboard}"
               class="btn btn-outline-success">
                Torna alla dashboard
            </a>

            <a th:if="${profilo.ruolo == 'ROLE_USER_PRO'}"
               th:href="@{/pro/dashboard}"
               class="btn btn-outline-success">
                Torna alla dashboard
            </a>

        </div>

    </section>

</main>

<footer class="py-4 mt-5">

    <div class="container text-center">

        <p class="fw-bold mb-1">
            Fitness with Pets
        </p>

        <p class="small mb-0">
            Team 05 — Profilo utente
        </p>

    </div>

</footer>

</body>
</html>
