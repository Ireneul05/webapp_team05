<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Statistiche - Fitness with Pets</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>
        body {
            background-color: #f0fdf4;
        }

        .navbar-personalizzata {
            background-color: #14532d;
        }
    </style>
</head>

<body>

<nav class="navbar navbar-dark navbar-personalizzata">
    <div class="container">

        <a class="navbar-brand fw-bold"
           th:href="@{/basic/dashboard}">
            Fitness with Pets
        </a>

        <span class="badge bg-primary">
            Piano Basic
        </span>

    </div>
</nav>

<main class="container py-5">

    <section class="bg-white rounded-4 shadow-sm p-4">

        <h1 class="text-success fw-bold">
            Le tue statistiche
        </h1>

        <p>
            Utente:
            <strong th:text="${username}">utente</strong>
        </p>

        <div class="alert alert-info">
            Non hai ancora completato allenamenti.
            Le statistiche compariranno dopo il completamento
            del primo programma.
        </div>

        <div class="row g-4 mt-2">

            <div class="col-md-6">
                <div class="border rounded-3 p-4">

                    <p class="text-muted mb-1">
                        Allenamenti completati
                    </p>

                    <p class="display-5 fw-bold text-success mb-0">
                        0
                    </p>

                </div>
            </div>

            <div class="col-md-6">
                <div class="border rounded-3 p-4">

                    <p class="text-muted mb-1">
                        Programmi differenti
                    </p>

                    <p class="display-5 fw-bold text-success mb-0">
                        0
                    </p>

                </div>
            </div>

        </div>

        <a th:href="@{/basic/dashboard}"
           class="btn btn-outline-success mt-4">
            Torna alla dashboard
        </a>

    </section>

</main>

</body>
</html>
