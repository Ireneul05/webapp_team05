#Il database della web app principale si chiamerà: webappdb

spring.application.name=webapp_team05
server.port=8080

spring.datasource.url=jdbc:h2:file:./data/webappdb;AUTO_SERVER=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Esegue schema.sql e data.sql all'avvio
spring.sql.init.mode=always

